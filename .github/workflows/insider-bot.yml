name: Peltz Bot Insider Scanner

on:
  workflow_dispatch:
  schedule:
  - cron: "*/10 * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Pobierz repo
        uses: actions/checkout@v4

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Zainstaluj biblioteki
        run: pip install requests

      - name: Uruchom bota
        run: python app.py

      - name: Zapisz widziane filingi
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_accessions.json || true
          git commit -m "update seen accessions" || true
          git push || true
